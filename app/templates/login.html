{% extends "base.html" %}
{% block title %}Login — TaskOrbit{% endblock %}

{% block content %}
<section class="to-auth-section d-flex align-items-center">
  <div class="container" style="position: relative; z-index: 1;">
    <div class="row justify-content-center">
      <div class="col-sm-10 col-md-6 col-lg-4">

        <div class="to-auth-card p-4 p-md-5">

          <!-- Logo + heading -->
          <div class="text-center mb-4">
            <div class="to-auth-icon mb-3">
              <i class="bi bi-box-arrow-in-right"></i>
            </div>
            <p class="to-auth-logo mb-1">TaskOrbit</p>
            <h4 class="mb-1">Welcome back</h4>
            <p class="small mb-0" style="color: var(--to-text-muted);">Log in to your account</p>
          </div>

          <!-- Form -->
          <form method="POST" action="{{ url_for('auth.login') }}" novalidate>

            <div class="mb-3">
              <label for="email" class="form-label">Email address</label>
              <div class="to-input-group">
                <i class="bi bi-envelope to-input-icon"></i>
                <input type="email" class="form-control to-input" id="email" name="email"
                  placeholder="you@example.com" required autocomplete="email"/>
              </div>
            </div>

            <div class="mb-4">
              <label for="password" class="form-label">Password</label>
              <div class="to-input-group">
                <i class="bi bi-lock to-input-icon"></i>
                <input type="password" class="form-control to-input" id="password" name="password"
                  placeholder="••••••••" required autocomplete="current-password"/>
              </div>
            </div>

            <button type="submit" class="btn to-btn-accent w-100 py-2">
              <i class="bi bi-box-arrow-in-right me-2"></i>Login
            </button>

          </form>

          <div class="to-divider">or</div>

          <p class="text-center small mb-0" style="color: var(--to-text-muted);">
            Don't have an account?
            <a href="{{ url_for('auth.register') }}" class="to-link ms-1">Sign up free</a>
          </p>

        </div>

      </div>
    </div>
  </div>
</section>
{% endblock %}
