<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 180 40" width="180" height="40">
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6c8fff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#b48eff;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="ringGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6c8fff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#b48eff;stop-opacity:0.4" />
    </linearGradient>
  </defs>

  <!-- Orbit ring -->
  <ellipse cx="20" cy="20" rx="14" ry="7"
    fill="none"
    stroke="url(#ringGrad)"
    stroke-width="1.5"
    transform="rotate(-30 20 20)"
  />

  <!-- Outer glow circle -->
  <circle cx="20" cy="20" r="5" fill="url(#grad)" opacity="0.15"/>

  <!-- Center dot (planet) -->
  <circle cx="20" cy="20" r="3.5" fill="url(#grad)"/>

  <!-- Small orbiting dot -->
  <circle cx="30" cy="13" r="1.8" fill="#b48eff"/>

  <!-- Brand name -->
  <text
    x="42" y="25"
    font-family="Inter, Segoe UI, sans-serif"
    font-size="16"
    font-weight="800"
    letter-spacing="-0.5"
    fill="url(#grad)"
  >TaskOrbit</text>
</svg>
